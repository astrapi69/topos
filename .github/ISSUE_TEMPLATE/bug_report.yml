name: Bug Report
description: Report a defect in Topos
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.
        Please search existing issues first to avoid duplicates.
        For security vulnerabilities, do not open a public issue;
        use GitHub Private Vulnerability Reporting per SECURITY.md.
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear description of what is wrong, including expected vs actual behavior.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list, exact enough that someone unfamiliar with the bug can hit it.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Backend logs, browser console output, or screenshots that help diagnose. Optional.
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Backend
        - Frontend
        - Plugin
        - Launcher
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Topos version, Python and Node versions, deployment mode (Docker, make dev, launcher).
      placeholder: |
        OS: Ubuntu 24.04
        Topos: 0.30.0
        Python: 3.12.3
        Node: 24.x
        Deployment: docker compose
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](CODE_OF_CONDUCT.md).
      options:
        - label: I have read and agree to the Code of Conduct
          required: true
