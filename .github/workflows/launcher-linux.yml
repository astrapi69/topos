name: Launcher (Linux)

# Builds the Linux launcher binary and publishes a SHA256 checksum next
# to it. Runs on:
#   - push to main when launcher/ changes (smoke build, uploads an
#     artifact to the workflow run for download + manual verification)
#   - release tag v*.*.* (attaches the binary + checksum to the GitHub
#     release as release assets)
#
# Parallels launcher-windows.yml. The launcher source code is platform-
# agnostic (platformdirs, subprocess, tkinter) so both jobs run the
# same pyproject.toml, tests, and PyInstaller spec file.

on:
  push:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-linux.yml"
  pull_request:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-linux.yml"
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build launcher binary
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: launcher
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        # tkinter is not bundled with the manylinux Python wheels used
        # by actions/setup-python on Linux runners. Install the system
        # tk package so PyInstaller can detect and bundle it.
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Verify version lock-step (release event only)
        # On release-triggered builds, fail fast if any subsystem is
        # out of sync with backend/pyproject.toml. Same gate as
        # release-gate.yml; duplicated here so artifact attachment
        # cannot proceed past a failed gate. Skipped for push/PR
        # events (those are CI smoke builds, not release artifacts).
        # Runs AFTER actions/setup-python so python3 is 3.12+
        # (sync_versions.py uses tomllib, stdlib in 3.11+).
        if: github.event_name == 'release'
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x scripts/verify_version_pins.sh scripts/sync_versions.py
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/verify_version_pins.sh "$VERSION"
          python3 scripts/sync_versions.py --check

      - name: Install launcher dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run launcher unit tests
        run: poetry run pytest tests/ -v

      - name: Regenerate placeholder icon
        run: poetry run python scripts/make_icon.py

      - name: Build myapp-launcher binary
        # The spec file is cross-platform aware (icon + version metadata
        # are Windows-only and are skipped on Linux). Same spec as the
        # Windows build, same entrypoint, same excludes.
        run: poetry run pyinstaller myapp-launcher.spec --clean --noconfirm

      - name: Compute SHA256 checksum
        run: |
          hash=$(sha256sum dist/myapp-launcher | awk '{print $1}')
          echo "$hash  myapp-launcher" > dist/myapp-launcher.sha256
          echo "SHA256: $hash"

      - name: Upload smoke artifact (push / PR / dispatch)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v6
        with:
          name: myapp-launcher-linux
          path: |
            launcher/dist/myapp-launcher
            launcher/dist/myapp-launcher.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag push)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            launcher/dist/myapp-launcher
            launcher/dist/myapp-launcher.sha256
          fail_on_unmatched_files: true
