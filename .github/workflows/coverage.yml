name: Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      - name: Run backend coverage
        working-directory: backend
        run: |
          poetry run pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml
          retention-days: 14

  # Plugin coverage matrix job: skeleton ships zero plugins.
  # When the user adds their first plugin, re-enable by populating
