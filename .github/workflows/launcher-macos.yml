name: Launcher (macOS)

# Builds the macOS .app bundle launcher and publishes a SHA256 checksum
# next to it. Runs on:
#   - push to main when launcher/ changes (smoke build, uploads an
#     artifact to the workflow run for download + manual verification)
#   - release tag v*.*.* (attaches the ZIP + checksum to the GitHub
#     release as release assets)
#
# Parallels launcher-windows.yml and launcher-linux.yml. The launcher
# source code is platform-agnostic; only the spec file's BUNDLE block
# is macOS-specific.
#
# arm64 only for initial D-02 (macos-14 runner = Apple Silicon). Intel
# Mac support would require universal2 builds or a separate macos-13
# job - deferred until users request it.
#
# Unsigned binary: first launch requires right-click -> Open to bypass
# Gatekeeper. Code signing requires an Apple Developer account and is
# out of scope for the initial D-02.

on:
  push:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-macos.yml"
  pull_request:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-macos.yml"
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build launcher .app bundle
    runs-on: macos-14  # Apple Silicon (arm64)
    defaults:
      run:
        working-directory: launcher
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Verify version lock-step (release event only)
        # On release-triggered builds, fail fast if any subsystem is
        # out of sync with backend/pyproject.toml. Same gate as
        # release-gate.yml; duplicated here so artifact attachment
        # cannot proceed past a failed gate. Runs AFTER
        # actions/setup-python so python3 is 3.12+ (sync_versions.py
        # uses tomllib, stdlib in 3.11+).
        if: github.event_name == 'release'
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x scripts/verify_version_pins.sh scripts/sync_versions.py
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/verify_version_pins.sh "$VERSION"
          python3 scripts/sync_versions.py --check

      - name: Install launcher dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run launcher unit tests
        run: poetry run pytest tests/ -v

      - name: Regenerate placeholder icon (PNG frames via Pillow)
        run: poetry run python scripts/make_icon.py

      - name: Convert placeholder icon to .icns (macOS-only iconutil)
        # topos.ico is multi-size; make_icns.py extracts the largest
        # frame, resamples to the standard .icns size set, and invokes
        # iconutil. iconutil is macOS-only so this step does not run on
        # Linux/Windows builds.
        run: poetry run python scripts/make_icns.py

      - name: Build .app bundle
        run: poetry run pyinstaller topos-launcher.spec --clean --noconfirm

      - name: Zip .app bundle
        # Notarization / distribution expect the .app inside a ZIP or DMG.
        # We ship ZIP only for initial D-02 to keep the pipeline simple.
        run: |
          cd dist
          zip -r topos-launcher-macos.zip "Topos Launcher.app"

      - name: Compute SHA256 checksum
        run: |
          cd dist
          hash=$(shasum -a 256 topos-launcher-macos.zip | awk '{print $1}')
          echo "$hash  topos-launcher-macos.zip" > topos-launcher-macos.zip.sha256
          echo "SHA256: $hash"

      - name: Upload smoke artifact (push / PR / dispatch)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v6
        with:
          name: topos-launcher-macos
          path: |
            launcher/dist/topos-launcher-macos.zip
            launcher/dist/topos-launcher-macos.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag push)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            launcher/dist/topos-launcher-macos.zip
            launcher/dist/topos-launcher-macos.zip.sha256
          fail_on_unmatched_files: true
