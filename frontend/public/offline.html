<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#1e40af"/>
    <title>Topos - Offline</title>
    <!--
      Static offline fallback. This file lives in public/ and is NOT
      processed by Vite/Tailwind, so the palette is inlined to match the
      Tailwind theme (gray-900 background, gray-100 text, blue-600 accent).
    -->
    <style>
        :root { color-scheme: dark; }
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827; /* gray-900 */
            color: #f3f4f6;      /* gray-100 */
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            padding: 1.5rem;
        }
        .card {
            max-width: 28rem;
            text-align: center;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: #1e40af; /* blue-800 */
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
        }
        p {
            color: #9ca3af; /* gray-400 */
            line-height: 1.6;
            margin: 0 0 1.5rem;
        }
        .en { font-size: 0.875rem; }
        button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: #2563eb; /* blue-600 */
            color: #ffffff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; /* blue-700 */ }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">T</div>
    <h1>Topos ist offline</h1>
    <p>
        Die Verbindung zum Server ist unterbrochen. Die zuletzt geladenen
        Daten bleiben in der App verfügbar.
        <br/>
        <span class="en">You are offline. The most recently loaded data is still available.</span>
    </p>
    <button type="button" onclick="window.location.reload()">Erneut versuchen</button>
</div>
</body>
</html>
