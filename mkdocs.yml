site_name: Adaptive Learner
site_description: Project skeleton template documentation
site_url: https://astrapi69.github.io/myapp/
repo_url: https://github.com/astrapi69/pluginforge-app-template
repo_name: astrapi69/myapp
docs_dir: docs/help
theme:
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.tabs.link
  icon:
    repo: fontawesome/brands/github
plugins:
- search
- i18n:
    docs_structure: folder
    languages:
    - locale: de
      name: Deutsch
      default: true
      build: true
    - locale: en
      name: English
      build: true
      nav_translations:
        Erste Schritte: Getting Started
        Artikel: Articles
        Übersicht: Overview
        Bücher: Books
        Formatierung: Formatting
        Vorlagen: Templates
        Docker Desktop installieren: Install Docker Desktop
        Plattformübergreifende Installer: Cross-platform installers
        Windows-Launcher: Windows Launcher
        macOS-Launcher: macOS Launcher
        Linux-Launcher: Linux Launcher
        Deinstallieren: Uninstall
        KI-Assistent: AI Assistant
        KI-Vorlagen (Artikel + Bücher): AI Templates (Articles + Books)
        Tastenkürzel: Keyboard Shortcuts
        Unterstützen: Support
        Glossar: Glossary
        Fehlerbehebung: Troubleshooting
        Entwickler: Developers
        Architektur-Übersicht: Architecture overview
        Plugin-Entwicklung: Plugin Development
        Mitwirken: Contributing
        API-Referenz: API reference
        Entwickler-Fehlerbehebung: Developer Troubleshooting
- git-revision-date-localized:
    enable_creation_date: true
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: true
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/astrapi69/pluginforge-app-template
nav:
- Home: de/index.md
- Erste Schritte: de/getting-started.md
- Artikel:
  - Übersicht: de/articles.md
- Editor:
  - Übersicht: de/editor/uebersicht.md
  - Formatierung: de/editor/formatierung.md
- Plugins:
  - Übersicht: de/plugins/uebersicht.md
- Vorlagen: de/templates.md
- Installation:
  - Übersicht: de/installation.md
  - Docker Desktop installieren: de/install/docker-desktop.md
  - Plattformübergreifende Installer: de/install/cross-platform-installers.md
  - Windows-Launcher: de/launcher-windows.md
  - macOS-Launcher: de/launcher-macos.md
  - Linux-Launcher: de/launcher-linux.md
  - Deinstallieren: de/uninstall.md
- KI-Assistent:
  - Übersicht: de/ai.md
  - KI-Vorlagen (Artikel + Bücher): de/ai/ai-templates.md
- Themes: de/themes.md
- Tastenkürzel: de/shortcuts.md
- Unterstützen: de/support.md
- FAQ: de/faq.md
- Glossar: de/glossary.md
- Fehlerbehebung: de/troubleshooting.md
- Entwickler:
  - Architektur-Übersicht: de/developers/architecture.md
  - Plugin-Entwicklung: de/developers/plugins.md
  - Mitwirken: de/developers/contributing.md
  - Deployment: de/developers/deployment.md
  - API-Referenz: de/developers/api-reference.md
  - Entwickler-Fehlerbehebung: de/developers/troubleshooting.md
