languages:
  - code: de
    name: Deutsch
    default: true
  - code: en
    name: English

# Help-panel + MkDocs nav schema. mkdocs.yml is regenerated from
# this file at release time via scripts/generate_mkdocs_nav.py.
# Each top-level entry is a section; children render as a
# collapsible submenu. Slugs are file paths relative to
# docs/help/{lang}/ without the .md extension.

navigation:
  - title:
      de: Erste Schritte
      en: Getting Started
    slug: getting-started
    icon: rocket

  - title:
      de: Artikel
      en: Articles
    slug: articles
    icon: file-text

  - title:
      de: Editor
      en: Editor
    slug: editor/uebersicht
    icon: edit
    children:
      - title:
          de: Übersicht
          en: Overview
        slug: editor/uebersicht
      - title:
          de: Formatierung
          en: Formatting
        slug: editor/formatierung

  - title:
      de: Plugins
      en: Plugins
    slug: plugins/uebersicht
    icon: puzzle

  - title:
      de: Vorlagen
      en: Templates
    slug: templates
    icon: layout

  - title:
      de: Installation
      en: Installation
    slug: installation
    icon: download
    children:
      - title:
          de: Übersicht
          en: Overview
        slug: installation
      - title:
          de: Docker Desktop installieren
          en: Install Docker Desktop
        slug: install/docker-desktop
      - title:
