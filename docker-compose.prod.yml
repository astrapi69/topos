services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - topos-data:/app/data
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - TOPOS_DEBUG=false
      # Single canonical data dir. DB lives at $DATA_DIR/topos.db
      # and uploads at $DATA_DIR/uploads/, both inside the named
      # volume so they survive container rebuilds. The volume mount
      # at /app/data is the persistence boundary.
      - TOPOS_DATA_DIR=/app/data
      - TOPOS_CORS_ORIGINS=${TOPOS_CORS_ORIGINS:-http://localhost:7880}
      - TOPOS_SECRET_KEY=${TOPOS_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${TOPOS_PORT:-7880}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  topos-data:
